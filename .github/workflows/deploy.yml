name: Deploy

# Автодеплой (этап 31). Push в master → SSH на сервер → обновление кода и пересборка
# app. Данные в томах pgdata/redisdata переживают деплой (векторы перенесены дампом на
# этапе 31 — import_price/embed_index на проде НЕ нужны). Untracked .env на сервере не
# затрагивается (git reset --hard трогает только отслеживаемые файлы).
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.INSTALL_DIR || '/opt/telewin/tgbot_py' }}
            git fetch --all
            git reset --hard origin/master
            docker compose up -d --build
            docker image prune -f
